<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baan Nam Sai</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body {
  font-family: 'Montserrat', system-ui, sans-serif;
  background: #f2f2f2; margin: 0; padding: 8px;
}
.app { max-width: 400px; margin: 0 auto; }

/* ── Header ── */
.header {
  display: flex; justify-content: space-between; align-items: center;
  background: #fff; padding: 12px; border-radius: 10px;
  margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.logo { height: 70px; }
.actions { display: flex; gap: 8px; align-items: center; }
.avatar { width: 32px; height: 32px; border-radius: 50%; display: none; }
.btn {
  padding: 6px 14px; font-size: 13px; border-radius: 6px;
  border: 1px solid #bbb; background: #fff; cursor: pointer;
  font-family: 'Montserrat', sans-serif;
}

/* ── Section titles ── */
.section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: #999;
  margin: 16px 0 6px 4px;
}

/* ── Cards ── */
.card {
  background: #fff; border-radius: 10px; padding: 12px;
  margin-bottom: 10px; border: 2px solid #e8e8e8;
  box-shadow: 0 1px 3px rgba(0,0,0,.07);
}
.card-title { font-weight: 700; font-size: 15px; }

/* ── House maintenance list ── */
.maint-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 10px; border-radius: 7px; margin-top: 6px;
  background: #f8f8f8; border-left: 3px solid #e0e0e0;
}
.maint-item.ok   { border-color: #4caf50; }
.maint-item.warn { border-color: #ff9800; }
.maint-item.red  { border-color: #e53935; }
.maint-item-label { font-size: 11px; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.maint-item-value { font-size: 13px; font-weight: 700; }

/* ── Inventory ── */
.inv-list { margin-top: 7px; }
.inv-item {
  display: flex; align-items: center; gap: 4px; padding: 5px 0;
  border-bottom: 1px solid #f0f0f0; font-size: 13px;
}
.inv-item:last-child { border-bottom: none; }
.inv-item span { min-width: 0; }
.inv-item .inv-name { flex: 1; white-space: nowrap; }
.del-btn { color: #ccc; cursor: pointer; padding: 0 4px; font-size: 15px; line-height: 1; }
.del-btn:hover { color: #e53935; }
.entry-btn { color: #999; cursor: pointer; padding: 0 2px; font-size: 11px; font-weight: 700; line-height: 1; text-transform: uppercase; flex: 0 0 auto; }
.entry-btn:hover { color: #222; }

/* ── Bike card status styles ── */
.card.free       { background: #e8f5e9; border-color: #4caf50; }
.card.assigned   { border-color: #e53935; }
.card.unavailable{ background: #eee;     border-color: #9e9e9e; }

.bike-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.bike-name   { font-weight: 700; font-size: 15px; }
.plate       { font-weight: 800; font-size: 14px; color: #333; }

.bike-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.maint-item.red { animation: pulse 1.4s infinite; }

/* Modal option list */
.modal-option {
  padding: 11px 12px; border-radius: 7px; cursor: pointer;
  font-size: 14px; font-weight: 600; margin-bottom: 4px;
  background: #f8f8f8;
}
.modal-option:hover { background: #eee; }
.modal-option.selected { background: #222; color: #fff; }

/* Clickable hint for admin */
.tappable { cursor: pointer; }
.tappable:active { opacity: .7; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.modal-box {
  background: #fff; border-radius: 14px; padding: 20px 18px;
  width: 88%; max-width: 340px; box-shadow: 0 6px 24px rgba(0,0,0,.18);
}
.modal-title { font-weight: 700; font-size: 15px; margin-bottom: 14px; }
.modal-input {
  width: 100%; padding: 10px 11px; border: 1px solid #ddd; border-radius: 8px;
  font-size: 14px; font-family: 'Montserrat', sans-serif;
  margin-bottom: 8px; box-sizing: border-box;
}
.modal-btns { display: flex; gap: 8px; margin-top: 4px; }
.modal-btns button {
  flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer;
  font-size: 14px; font-family: 'Montserrat', sans-serif; font-weight: 700;
}
.modal-btns .save-btn   { background: #222; color: #fff; }
.modal-btns .cancel-btn { background: #eee; color: #555; }

/* Service history */
.svc-bar {
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid #eee; margin-top: 8px; padding-top: 7px;
  font-size: 12px; color: #777; cursor: pointer;
}
.svc-bar:hover { color: #333; }
.svc-list { margin-top: 6px; }
.svc-entry {
  display: flex; align-items: baseline; padding: 5px 0;
  border-bottom: 1px solid #f0f0f0; font-size: 12px; gap: 6px;
}
.svc-entry:last-child { border-bottom: none; }
.svc-note { flex: 1; color: #333; }
.svc-date { color: #aaa; font-size: 11px; white-space: nowrap; }

.updated { font-size: 11px; color: #aaa; margin-top: 5px; }

</style>
</head>

<body>
<div class="app">

<!-- HEADER -->
<div class="header">
  <img src="Logo.png" class="logo">
  <div class="actions">
    <img id="avatar" class="avatar">
    <button id="loginBtn"  class="btn" onclick="signIn()">Login</button>
    <button id="logoutBtn" class="btn" style="display:none" onclick="signOut()">Logout</button>
  </div>
</div>

<div class="section-title">Houses</div>
<div id="houses"></div>

<div class="section-title">Motorcycles</div>
<div id="bikes"></div>

</div><!-- .app -->

<div id="modal" class="modal-overlay" style="display:none" onclick="closeModal()"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
/* ═══════════════════════════════════════════
   FIREBASE
═══════════════════════════════════════════ */
firebase.initializeApp({
  apiKey: "AIzaSyCqJ-LqV_hn06MhfweOTJGIDmIt5bIq2JI",
  authDomain: "baan-namsai-bikes.firebaseapp.com",
  projectId: "baan-namsai-bikes"
});
const auth = firebase.auth();
const db   = firebase.firestore();
const ADMIN_UID = "pK46rxDcvEVZEyktMvc8g2FaCoH2";
db.enablePersistence().catch(() => {});

/* ═══════════════════════════════════════════
   STATIC DATA
═══════════════════════════════════════════ */
const HOUSES = [
  { id: "baan-mai",     en: "Baan Mai",      aircons: 3 },
  { id: "baan-nam-lom", en: "Baan Nam Lom",  aircons: 1 },
  { id: "baan-mai-pai", en: "Baan Mai Pai",  aircons: 1 },
  { id: "baan-makham",  en: "Baan Makham",   aircons: 2 }
];

const BIKES = [
  { id: 1, name: "Honda Click",   img: "click_redblack.png",   plate: "1กต 8316", color: "#7B1C2E" },
  { id: 2, name: "Yamaha Fazzio", img: "fazzio_darkgrey.png",  plate: "1กร 5287", color: "#4A4A4A" },
  { id: 3, name: "Yamaha Fazzio", img: "fazzio_lightblue.png", plate: "1กพ 2670", color: "#7BBFDA" }
];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let isAdmin      = false;
let _pendingSave = null;
let _openInvModal = null;
let _openSvcModal = null;
let _editingInvItemId = null;
let _editingSvcEntryId = null;

let houseData = {};
let bikeData  = {};
try { houseData = JSON.parse(localStorage.getItem("houseCache") || "{}"); } catch {}
try { bikeData  = JSON.parse(localStorage.getItem("bikeCache")  || "{}"); } catch {}

/* ═══════════════════════════════════════════
   STRINGS
═══════════════════════════════════════════ */
const L = {
  aircon:"Aircon", fireAlarm:"Fire Alarm Battery", inv:"Inventory",
  tax:"Tax", ins:"Insurance", svc:"Last Service",
  free:"Available", unavail:"Unavailable",
  expired:"Expired", days:"days", months:"months",
  never:"Never recorded", ago:"ago",
  viewSvc:"Service history", hideSvc:"Hide history",
  noSvc:"No service logged yet", logSvc:"+ Log Service",
  today:"Today", save:"Save", cancel:"Cancel",
  addItem:"Add item…", by:"by", min:"min ago", hour:"h ago", day:"d ago"
};
const t = k => L[k] ?? k;

/* ═══════════════════════════════════════════
   DATE HELPERS
═══════════════════════════════════════════ */
function todayStr() {
  const d = new Date();
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${String(d.getFullYear()).slice(-2)}`;
}
function pad(n) { return String(n).padStart(2, '0'); }
function parseDate(s) {
  if (!s || !/^\d{2}\/\d{2}\/\d{2}$/.test(s)) return null;
  const [d,m,y] = s.split('/').map(Number);
  return new Date(2000+y, m-1, d);
}
function daysLeft(s)  { const d=parseDate(s); return d ? Math.ceil((d-new Date())/86400000) : null; }
function daysSince(s) { const d=parseDate(s); return d ? Math.floor((new Date()-d)/86400000) : null; }
function remaining(n) {
  if (n===null) return '—';
  if (n<0) return t('expired');
  if (n<=60) return n+' '+t('days');
  return Math.round(n/30)+' '+t('months');
}
function sinceStr(s) {
  const d = daysSince(s);
  if (d===null) return t('never');
  if (d===0) return 'Today';
  if (d<=60)  return d+' '+t('days')+' '+t('ago');
  return Math.round(d/30)+' '+t('months')+' '+t('ago');
}
function timeAgo(ts) {
  const s = Math.floor((Date.now()-ts)/1000);
  if (s<3600)  return Math.floor(s/60)+' '+t('min');
  if (s<86400) return Math.floor(s/3600)+' '+t('hour');
  return Math.floor(s/86400)+' '+t('day');
}
function uid() { return Math.random().toString(36).slice(2,10); }
// Convert DD/MM/YY  →  YYYY-MM-DD  (for <input type="date">)
function toInputDate(s) {
  if (!s || !/^\d{2}\/\d{2}\/\d{2}$/.test(s)) return '';
  const [d,m,y] = s.split('/');
  return `20${y}-${m}-${d}`;
}
// Convert YYYY-MM-DD  →  DD/MM/YY
function fromInputDate(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${String(y).slice(-2)}`;
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function maintCls(days, warnAt, redAt) {
  if (days===null || days>=redAt) return 'red';
  if (days>=warnAt)               return 'warn';
  return 'ok';
}

/* ═══════════════════════════════════════════
   RENDER — HOUSES
═══════════════════════════════════════════ */
function renderHouses() {
  document.getElementById('houses').innerHTML = HOUSES.map(renderHouse).join('');
}

function renderHouse(h) {
  const d   = houseData[h.id] || {};
  const fir = daysSince(d.fireAlarmDate);
  const inv = d.inventory || [];
  const assignedBikes = BIKES.filter(b => (bikeData[b.id]||{}).status === h.en);

  function maintItem(cls, label, date, tapAttr) {
    const color = cls==='red'?'#e53935': cls==='warn'?'#ff9800': '#222';
    return `<div class="maint-item ${cls} tappable" ${tapAttr}>
      <div class="maint-item-label">${label}</div>
      <div class="maint-item-value" style="color:${color}">${sinceStr(date)}</div>
    </div>`;
  }

  const airItems = Array.from({length: h.aircons}, (_, i) => {
    const n        = i + 1;
    const dateKey  = `airconDate_${n}`;
    const nameKey  = `airconName_${n}`;
    const date     = d[dateKey] || null;
    const cls      = maintCls(daysSince(date), 150, 180);
    const defName  = h.aircons > 1 ? `Aircon ${n}` : 'Aircon';
    const label    = d[nameKey] || defName;
    const tap      = isAdmin ? `onclick="editHouseItem('${h.id}','${dateKey}','${nameKey}','${defName}','${date||''}','${escHtml(d[nameKey]||'')}')"` : '';
    return maintItem(cls, label, date, tap);
  }).join('');

  const firCls     = maintCls(fir, 330, 365);
  const firDefName = 'Fire Alarm';
  const firLabel   = d.fireAlarmName || firDefName;
  const firTap     = isAdmin ? `onclick="editHouseItem('${h.id}','fireAlarmDate','fireAlarmName','${firDefName}','${d.fireAlarmDate||''}','${escHtml(d.fireAlarmName||'')}')"` : '';

  const bikeRows = assignedBikes.map(b => `
    <div class="maint-item tappable" style="border-color:${b.color}" onclick="showStatusModal(${b.id})">
      <div class="maint-item-label">Motorcycle</div>
      <div class="maint-item-value" style="color:${b.color}">${b.name}</div>
    </div>`).join('');

  return `
  <div class="card">
    <div class="card-title" style="margin-bottom:2px">${h.en}</div>

    ${bikeRows}

    ${airItems}
    ${maintItem(firCls, firLabel, d.fireAlarmDate||null, firTap)}
    <div class="maint-item tappable" onclick="showInvModal('${h.id}')">
      <div class="maint-item-label">Inventory</div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════
   RENDER — BIKES
═══════════════════════════════════════════ */
function renderBikes() {
  document.getElementById('bikes').innerHTML = BIKES.map(renderBike).join('');
}

function renderBike(b) {
  const d = bikeData[b.id] || { status: 'Free' };
  const taxDays = daysLeft(d.taxExpiry);
  const insDays = daysLeft(d.insuranceExpiry);
  const svcList = d.serviceHistory || [];
  const lastSvc = svcList.length ? svcList[svcList.length-1] : null;
  const svcDays = lastSvc ? daysSince(lastSvc.date) : null;
  const lastSvcMileage = lastSvc?.mileage ? ` (${escHtml(lastSvc.mileage)} km)` : '';

  const taxCls = taxDays===null?'':taxDays<0?'red':taxDays<=14?'warn':'';
  const insCls = insDays===null?'':insDays<0?'red':insDays<=14?'warn':'';
  const svcCls = svcDays===null?'':svcDays>=120?'red':svcDays>=90?'warn':'';

  const statusLabel   = d.status==='Free'?t('free'): d.status==='Unavailable'?t('unavail'): d.status;
  const statusCardCls = d.status==='Free'?'free': d.status==='Unavailable'?'unavailable': 'assigned';
  const statusCls     = d.status==='Free'?'ok': d.status==='Unavailable'?'': 'warn';

  function bikeItem(cls, label, value, tap) {
    const color = cls==='red'?'#e53935': cls==='warn'?'#ff9800': '#222';
    return `<div class="maint-item ${cls}${tap?' tappable':''}" ${tap}>
      <div class="maint-item-label">${label}</div>
      <div class="maint-item-value" style="color:${color}">${value}</div>
    </div>`;
  }

  return `
  <div class="card ${statusCardCls}">
    <div class="bike-header">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="bike-name">${b.name}</div>
        <span class="bike-dot" style="background:${b.color}"></span>
      </div>
      <div class="plate">${b.plate}</div>
    </div>

    ${bikeItem(statusCls, 'Assignment', statusLabel, `onclick="showStatusModal(${b.id})"`)}
    ${bikeItem(taxCls, t('tax'), remaining(taxDays), isAdmin?`onclick="editBikeDate(${b.id},'taxExpiry','Tax Expiry','${d.taxExpiry||''}')"`:'') }
    ${bikeItem(insCls, t('ins'), remaining(insDays), isAdmin?`onclick="editBikeDate(${b.id},'insuranceExpiry','Insurance Expiry','${d.insuranceExpiry||''}')"`:'') }
    ${bikeItem(svcCls, t('svc'), `${lastSvc ? sinceStr(lastSvc.date) : t('never')}${lastSvc ? ` - ${escHtml(lastSvc.note)}${lastSvcMileage}` : ''}`, isAdmin?`onclick="showServiceModal(${b.id})"`:'')}

  </div>`;
}

/* ═══════════════════════════════════════════
   RENDER ALL
═══════════════════════════════════════════ */
function renderAll() {
  renderHouses();
  renderBikes();
  if (_openInvModal) _renderInvModal(_openInvModal);
  if (_openSvcModal) _renderSvcModal(_openSvcModal);
}

/* ═══════════════════════════════════════════
   FIRESTORE SUBSCRIPTIONS
═══════════════════════════════════════════ */
BIKES.forEach(b => {
  db.collection('bikes').doc('bike'+b.id).onSnapshot(doc => {
    if (doc.exists) {
      const data = doc.data();
      bikeData[b.id] = { ...bikeData[b.id], ...data, updatedAt: data.updatedAt?.toMillis?.() };
      localStorage.setItem('bikeCache', JSON.stringify(bikeData));
      renderAll();
    }
  });
});

HOUSES.forEach(h => {
  db.collection('houses').doc(h.id).onSnapshot(doc => {
    houseData[h.id] = doc.exists ? doc.data() : {};
    localStorage.setItem('houseCache', JSON.stringify(houseData));
    renderAll();
  });
});

/* ═══════════════════════════════════════════
   AUTH
═══════════════════════════════════════════ */
const avatarEl  = document.getElementById('avatar');
const loginBtn  = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');

// Optimistic render from cache
try {
  const cu = JSON.parse(localStorage.getItem('authCache'));
  if (cu) {
    if (cu.photoURL) { avatarEl.src=cu.photoURL; avatarEl.style.display='block'; }
    loginBtn.style.display  = 'none';
    logoutBtn.style.display = 'inline-block';
    isAdmin = cu.uid === ADMIN_UID;
  }
} catch {}

auth.onAuthStateChanged(user => {
  if (user) {
    localStorage.setItem('authCache', JSON.stringify({ uid:user.uid, photoURL:user.photoURL, displayName:user.displayName }));
    if (user.photoURL) { avatarEl.src=user.photoURL; avatarEl.style.display='block'; } else { avatarEl.style.display='none'; }
    loginBtn.style.display  = 'none';
    logoutBtn.style.display = 'inline-block';
    isAdmin = user.uid === ADMIN_UID;
  } else {
    localStorage.removeItem('authCache');
    avatarEl.style.display  = 'none';
    loginBtn.style.display  = 'inline-block';
    logoutBtn.style.display = 'none';
    isAdmin = false;
  }
  renderAll();
});

function signIn()  { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function signOut() { auth.signOut(); }

/* ═══════════════════════════════════════════
   BIKE — STATUS
═══════════════════════════════════════════ */
function showStatusModal(bikeId) {
  const b = BIKES.find(b => b.id === bikeId);
  const current = (bikeData[bikeId] || {}).status || 'Free';
  const options = [
    { val: 'Free',        label: t('free') },
    ...HOUSES.map(h => ({ val: h.en, label: h.en })),
    { val: 'Unavailable', label: t('unavail') }
  ];
  _showModal(`
    <div class="modal-title">${b.name} — Assignment</div>
    ${options.map(o => `
      <div class="modal-option${current===o.val?' selected':''}" onclick="setStatus(${bikeId},'${o.val}');closeModal()">
        ${o.label}
      </div>`).join('')}
    <div class="modal-btns" style="margin-top:8px">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>`);
}

function setStatus(id, val) {
  if (!auth.currentUser) { signIn(); return; }
  openMenu = null;
  db.collection('bikes').doc('bike'+id).update({
    status: val,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedBy: auth.currentUser.displayName
  });
}

/* ═══════════════════════════════════════════
   BIKE — SERVICE HISTORY
═══════════════════════════════════════════ */
function _delSvcEntry(bikeId, entryId) {
  const prev = bikeData[bikeId]?.serviceHistory || [];
  const next = prev.filter(s => s.id !== entryId);
  if (_editingSvcEntryId === entryId) _editingSvcEntryId = null;
  _saveBikeServiceHistory(bikeId, next);
}

/* ═══════════════════════════════════════════
   HOUSE — BIKE ASSIGNMENT MODAL
═══════════════════════════════════════════ */
function showHouseBikeModal(houseId) {
  const h = HOUSES.find(h => h.id === houseId);
  const options = BIKES.map(b => {
    const status = (bikeData[b.id] || {}).status || 'Free';
    const sub    = status === 'Free' ? 'Available' : status === 'Unavailable' ? 'Unavailable' : status;
    return `<div class="modal-option" onclick="showStatusModal(${b.id})">
      <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${b.color};margin-right:8px;vertical-align:middle"></span>
      ${b.name}
      <span style="font-size:11px;color:#999;font-weight:400;margin-left:4px">— ${sub}</span>
    </div>`;
  }).join('');

  _showModal(`
    <div class="modal-title">${h.en} — Motorcycle</div>
    ${options}
    <div class="modal-btns" style="margin-top:8px">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>`);
}

/* ═══════════════════════════════════════════
   HOUSE — INVENTORY MODAL
═══════════════════════════════════════════ */
function showInvModal(houseId) {
  _openInvModal = houseId;
  _editingInvItemId = null;
  _renderInvModal(houseId);
}

function _renderInvModal(houseId) {
  const h   = HOUSES.find(h => h.id === houseId);
  const inv = houseData[houseId]?.inventory || [];
  const editingItem = inv.find(item => item.id === _editingInvItemId) || null;
  const el  = document.getElementById('modal');
  el.style.display = 'flex';
  el.innerHTML = `<div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">${h.en} - Inventory</div>
    <div id="inv-modal-list" style="margin-bottom:${isAdmin?'10px':'0'}">
      ${inv.length===0
        ? '<div style="font-size:13px;color:#bbb;padding:6px 0">No items yet</div>'
        : inv.map(item => `
          <div class="inv-item">
            <span ${isAdmin ? `class="inv-name entry-btn" style="text-transform:none;font-size:14px;padding:0" onclick="_editInvItem('${houseId}','${item.id}')"` : 'class="inv-name"'}>${escHtml(item.name)}</span>
            ${isAdmin ? `<span class="del-btn" onclick="_delInvItem('${houseId}','${item.id}')">✕</span>` : ''}
          </div>`).join('')}
    </div>
    ${isAdmin ? `
      <div style="display:flex;gap:8px">
        <input id="minv-new" class="modal-input" type="text" value="${escHtml(editingItem?.name || '')}" placeholder="Add item..." style="margin-bottom:0;flex:1"
          onkeydown="if(event.key==='Enter') _saveInvItem('${houseId}')">
        <button onclick="_saveInvItem('${houseId}')" style="padding:10px 16px;background:#222;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700">${editingItem ? 'Save' : '+'}</button>
      </div>` : ''}
    <div class="modal-btns" style="margin-top:12px">
      ${isAdmin && editingItem ? `<button class="cancel-btn" onclick="_cancelInvEdit('${houseId}')">Cancel Edit</button>` : ''}
      <button class="cancel-btn" onclick="closeModal()">Close</button>
    </div>
  </div>`;
}

function _saveHouseInventory(houseId, next) {
  houseData[houseId] = { ...(houseData[houseId] || {}), inventory: next };
  localStorage.setItem('houseCache', JSON.stringify(houseData));
  _renderInvModal(houseId);
  db.collection('houses').doc(houseId).set(
    { inventory: next },
    { merge: true }
  );
}

function _editInvItem(houseId, itemId) {
  _editingInvItemId = itemId;
  _renderInvModal(houseId);
}

function _cancelInvEdit(houseId) {
  _editingInvItemId = null;
  _renderInvModal(houseId);
}

function _saveInvItem(houseId) {
  const input = document.getElementById('minv-new');
  const name  = input?.value?.trim();
  if (!name) return;
  const prev = houseData[houseId]?.inventory || [];
  const next = _editingInvItemId
    ? prev.map(item => item.id === _editingInvItemId ? { ...item, name } : item)
    : [...prev, { id: uid(), name }];
  _editingInvItemId = null;
  _saveHouseInventory(houseId, next);
}

function _delInvItem(houseId, itemId) {
  const prev = houseData[houseId]?.inventory || [];
  const next = prev.filter(i => i.id !== itemId);
  if (_editingInvItemId === itemId) _editingInvItemId = null;
  _saveHouseInventory(houseId, next);
}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
function closeModal() {
  document.getElementById('modal').style.display = 'none';
  _pendingSave   = null;
  _openInvModal  = null;
  _openSvcModal = null;
  _editingInvItemId = null;
  _editingSvcEntryId = null;
}

function _showModal(html) {
  const el = document.getElementById('modal');
  el.style.display = 'flex';
  el.innerHTML = `<div class="modal-box" onclick="event.stopPropagation()">${html}</div>`;
}

// Date modal (tax, insurance, aircon, fire alarm)
function editBikeDate(id, field, title, currentVal) {
  _pendingSave = () => {
    const raw = document.getElementById('mdate')?.value;
    const val = fromInputDate(raw);
    if (!val) { alert('Please select a date'); return; }
    db.collection('bikes').doc('bike'+id).update({ [field]: val });
    closeModal();
  };
  _showModal(`
    <div class="modal-title">${title}</div>
    <input id="mdate" class="modal-input" type="date" value="${toInputDate(currentVal)}">
    <div class="modal-btns">
      <button class="save-btn" onclick="_pendingSave()">Save</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>`);
}

function editHouseItem(houseId, dateField, nameField, defaultName, currentDate, currentName) {
  _pendingSave = () => {
    const raw     = document.getElementById('mdate')?.value;
    const val     = fromInputDate(raw);
    const nameVal = document.getElementById('mname')?.value?.trim() || defaultName;
    const update  = { [nameField]: nameVal };
    if (val) update[dateField] = val;
    // optimistic local update so card reflects change immediately
    houseData[houseId] = { ...(houseData[houseId] || {}), ...update };
    localStorage.setItem('houseCache', JSON.stringify(houseData));
    renderAll();
    db.collection('houses').doc(houseId).set(update, { merge: true });
    closeModal();
  };
  _showModal(`
    <div class="modal-title">${currentName || defaultName}</div>
    <div class="maint-item-label" style="margin-bottom:4px">Name</div>
    <input id="mname" class="modal-input" type="text" value="${escHtml(currentName || defaultName)}" placeholder="${defaultName}">
    <div class="maint-item-label" style="margin-bottom:4px;margin-top:8px">Last serviced</div>
    <input id="mdate" class="modal-input" type="date" value="${toInputDate(currentDate)}">
    <div class="modal-btns">
      <button class="save-btn" onclick="_pendingSave()">Save</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>`);
}

// Service log modal
function showServiceModal(bikeId) {
  _openSvcModal = bikeId;
  _editingSvcEntryId = null;
  _renderSvcModal(bikeId);
}

function _renderSvcModal(bikeId) {
  const b = BIKES.find(b => b.id === bikeId);
  const svcList = bikeData[bikeId]?.serviceHistory || [];
  const editingEntry = svcList.find(s => s.id === _editingSvcEntryId) || null;
  const historyHtml = svcList.length === 0
    ? `<div style="font-size:12px;color:#bbb;padding:4px 0">${t('noSvc')}</div>`
    : [...svcList].reverse().map(s => `
        <div class="svc-entry">
          <span ${isAdmin ? `class="entry-btn" style="flex:1;text-transform:none;font-size:12px;padding:0" onclick="_editSvcEntry(${bikeId},'${s.id}')"` : 'class="svc-note"'}>${escHtml(s.note)}${s.mileage ? ` (${escHtml(s.mileage)} km)` : ''}</span>
          <span class="svc-date">${s.date}</span>
          ${isAdmin ? `<span class="del-btn" onclick="_delSvcEntry(${bikeId},'${s.id}')">✕</span>` : ''}
        </div>`).join('');

  const el = document.getElementById('modal');
  el.style.display = 'flex';
  el.innerHTML = `<div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">${b.name} - Service History</div>
    <div class="svc-list" style="margin-bottom:${isAdmin?'12px':'0'};max-height:220px;overflow-y:auto">${historyHtml}</div>
    ${isAdmin ? `
      <input id="msdate" class="modal-input" type="date" value="${toInputDate(editingEntry?.date || todayStr())}">
      <input id="msmileage" class="modal-input" type="number" inputmode="numeric" min="0" step="1" value="${escHtml(editingEntry?.mileage || '')}" placeholder="Mileage (km)">
      <input id="msnote" class="modal-input" type="text" value="${escHtml(editingEntry?.note || '')}" placeholder="e.g. Oil change, tyre check...">
      <div class="modal-btns">
        <button class="save-btn" onclick="_saveSvcEntry(${bikeId})">${editingEntry ? 'Save Changes' : 'Save'}</button>
        <button class="cancel-btn" onclick="${editingEntry ? `_cancelSvcEdit(${bikeId})` : `closeModal()`}">${editingEntry ? 'Cancel Edit' : 'Cancel'}</button>
      </div>` : `
      <div class="modal-btns"><button class="cancel-btn" onclick="closeModal()">Close</button></div>`}
  </div>`;
}

function _saveBikeServiceHistory(bikeId, next) {
  bikeData[bikeId] = { ...(bikeData[bikeId] || {}), serviceHistory: next };
  localStorage.setItem('bikeCache', JSON.stringify(bikeData));
  _renderSvcModal(bikeId);
  db.collection('bikes').doc('bike'+bikeId).update({
    serviceHistory: next
  });
}

function _editSvcEntry(bikeId, entryId) {
  _editingSvcEntryId = entryId;
  _renderSvcModal(bikeId);
}

function _cancelSvcEdit(bikeId) {
  _editingSvcEntryId = null;
  _renderSvcModal(bikeId);
}

function _saveSvcEntry(bikeId) {
  const date = fromInputDate(document.getElementById('msdate')?.value);
  const mileageRaw = document.getElementById('msmileage')?.value?.trim() || '';
  const note = document.getElementById('msnote')?.value?.trim();
  if (!date) { alert('Please select a date'); return; }
  if (!note) { alert('Add a note'); return; }
  const prev = bikeData[bikeId]?.serviceHistory || [];
  const next = _editingSvcEntryId
    ? prev.map(s => s.id === _editingSvcEntryId ? { ...s, date, mileage: mileageRaw, note } : s)
    : [...prev, { id: uid(), date, mileage: mileageRaw, note }];
  _editingSvcEntryId = null;
  _saveBikeServiceHistory(bikeId, next);
}


/* ═══════════════════════════════════════════
   SEED — historical service records (run once from console)
═══════════════════════════════════════════ */
async function seedServiceHistory() {
  if (!auth.currentUser) { console.error('Not logged in. Sign in first.'); return; }
  const historical = {
    'bike1': [
      { id: 'hist_1_1', date: '27/05/23', mileage: '12900', note: 'Oil, Gear Oil' },
      { id: 'hist_1_2', date: '26/11/23', mileage: '14900', note: 'Oil, Gear Oil' },
      { id: 'hist_1_3', date: '05/03/24', mileage: '17870', note: 'Oil, Gear Oil' },
      { id: 'hist_1_4', date: '25/09/24', mileage: '20272', note: 'Oil, Gear Oil' },
      { id: 'hist_1_5', date: '15/02/25', mileage: '23724', note: 'Oil, Gear Oil' },
      { id: 'hist_1_6', date: '15/11/25', mileage: '', note: 'Oil, Gear Oil' }
    ],
    'bike2': [
      { id: 'hist_2_1', date: '15/12/23', mileage: '', note: 'Oil, Gear Oil' },
      { id: 'hist_2_2', date: '18/09/24', mileage: '', note: 'Oil, Gear Oil' },
      { id: 'hist_2_3', date: '14/01/25', mileage: '', note: 'Oil, Gear Oil' },
      { id: 'hist_2_4', date: '15/11/25', mileage: '', note: 'Oil, Gear Oil' }
    ],
    'bike3': [
      { id: 'hist_3_1', date: '15/11/25', mileage: '', note: 'Oil, Gear Oil' }
    ]
  };
  for (const [docId, records] of Object.entries(historical)) {
    try {
      const doc = await db.collection('bikes').doc(docId).get();
      console.log(docId + ': doc exists =', doc.exists);
      const existing = doc.exists ? (doc.data().serviceHistory || []) : [];
      console.log(docId + ': existing records =', existing.length);
      const existingIds = new Set(existing.map(s => s.id));
      const toAdd = records.filter(r => !existingIds.has(r.id));
      console.log(docId + ': records to add =', toAdd.length);
      if (toAdd.length === 0) { console.log(docId + ': nothing to add'); continue; }
      const merged = [...existing, ...toAdd].sort((a, b) => {
        const pd = s => { const [d,m,y]=s.split('/'); return new Date(2000+Number(y),m-1,d); };
        return pd(a.date) - pd(b.date);
      });
      await db.collection('bikes').doc(docId).set({ serviceHistory: merged }, { merge: true });
      console.log(docId + ': done ✓');
    } catch(e) {
      console.error(docId + ': FAILED —', e.message);
    }
  }
  console.log('All done. Refresh the page.');
}

/* ═══════════════════════════════════════════
   SECURITY — prevent XSS in user-entered text
═══════════════════════════════════════════ */
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
renderAll();
</script>
